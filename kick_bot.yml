name: Web Site Bot Testi

on:
  workflow_dispatch: # Manuel başlatma butonu

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
    - name: Kodları Klonla
      uses: actions/checkout@v3

    - name: Python Kurulumu
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Gerekli Kütüphaneleri Yükle
      run: |
        python -m pip install --upgrade pip
        pip install aiohttp

    - name: Botu Çalıştır
      run: python bot.py