name: Web Site Bot Testi

on:
  workflow_dispatch: # Manuel başlatma butonu için

jobs:
  run-bot:
    # Hata veren sürüm yerine Playwright'ın sıfır hata ile kurulduğu kararlı sürüme çekiyoruz
    runs-on: ubuntu-20.04

    steps:
    - name: Kodlari Klonla
      uses: actions/checkout@v4

    - name: Python Kurulumu
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Gerekli Kutuphaneleri Yukle
      run: |
        python -m pip install --upgrade pip
        pip install playwright
        # Linux kütüphanelerini ubuntu-20.04 üzerinde hatasız kuracaktır
        playwright install chromium --with-deps

    - name: Botu Calistir
      run: python bot.py "https://furkantoprakhairstudio.github.io/goruntulenme/"
