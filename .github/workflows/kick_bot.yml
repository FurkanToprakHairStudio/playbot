name: Web Site Bot Testi

on:
  workflow_dispatch: # Manuel başlatma butonu için

jobs:
  run-bot:
    runs-on: ubuntu-latest # En hızlı açılan güncel sunucu
    
    # Playwright'ın resmi ve tüm Linux bağımlılıkları yüklü gelen Docker imajını kullanıyoruz
    container:
      image: mcr.microsoft.com/playwright:v1.42.0-jammy

    steps:
    - name: Kodlari Klonla
      uses: actions/checkout@v4

    - name: Python Kurulumu
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Gerekli Kutuphaneleri Yukle
      run: |
        python -m pip install --upgrade pip
        pip install playwright==1.42.0
        # Bağımlılıklar zaten imajda var, sadece chromium tarayıcısını indiriyoruz
        playwright install chromium

    - name: Botu Calistir
      run: python bot.py "https://furkantoprakhairstudio.github.io/goruntulenme/"
